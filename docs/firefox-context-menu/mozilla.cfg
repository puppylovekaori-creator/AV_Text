// AutoConfig for AV Text context-menu ordering
try {
  var Cc = Components.classes;
  var Ci = Components.interfaces;
  var DEBUG_LOG = false;
  var DEFAULT_MENU_ORDER_MODE = "top";
  var MAX_MOVE_DURATION_MS = 40;
  var MAX_SLOW_MOVES_PER_SESSION = 2;
  var VALID_MENU_ORDER_MODES = {
    top: true,
    near_cursor: true
  };
  var MENU_ORDER_MODE = DEFAULT_MENU_ORDER_MODE;
  var SLOW_MOVE_COUNT = 0;
  var SESSION_DISABLED = false;

  function writeTrace(message, force) {
    if (!DEBUG_LOG && !force) {
      return;
    }
    try {
      var file = Cc["@mozilla.org/file/directory_service;1"]
        .getService(Ci.nsIProperties)
        .get("ProfD", Ci.nsIFile);
      file.append("avtext-autoconfig.log");

      var fileStream = Cc["@mozilla.org/network/file-output-stream;1"]
        .createInstance(Ci.nsIFileOutputStream);
      fileStream.init(file, 0x02 | 0x08 | 0x20, 420, 0);

      var converter = Cc["@mozilla.org/intl/converter-output-stream;1"]
        .createInstance(Ci.nsIConverterOutputStream);
      converter.init(fileStream, "UTF-8", 0, 0);
      converter.writeString(new Date().toISOString() + " " + message + "\n");
      converter.close();
    } catch (traceError) {}
  }

  function isMenuNode(node) {
    return node && (node.localName == "menu" || node.localName == "menuitem");
  }

  function isTargetLabel(label) {
    return label == "AV Text Paster" || label == "サクラエディタを前面に";
  }

  function getMenuOrderModePath() {
    try {
      var env = Cc["@mozilla.org/process/environment;1"]
        .getService(Ci.nsIEnvironment);
      var appData = env.get("APPDATA");
      if (!appData) {
        return null;
      }
      var file = Cc["@mozilla.org/file/local;1"].createInstance(Ci.nsIFile);
      file.initWithPath(appData);
      file.append("sakura");
      file.append("avtext");
      file.append("menu_order_mode.json");
      return file;
    } catch (pathError) {
      writeTrace("mode path error");
      return null;
    }
  }

  function readTextFile(file) {
    var fileStream = null;
    var converter = null;
    try {
      fileStream = Cc["@mozilla.org/network/file-input-stream;1"]
        .createInstance(Ci.nsIFileInputStream);
      fileStream.init(file, 0x01, 0, 0);

      converter = Cc["@mozilla.org/intl/converter-input-stream;1"]
        .createInstance(Ci.nsIConverterInputStream);
      converter.init(fileStream, "UTF-8", 0, 0);

      var out = "";
      var str = {};
      while (converter.readString(4096, str) != 0) {
        out += str.value;
      }
      return out;
    } catch (readError) {
      writeTrace("mode read error");
      return "";
    } finally {
      try {
        if (converter) {
          converter.close();
        } else if (fileStream) {
          fileStream.close();
        }
      } catch (closeError) {}
    }
  }

  function getMenuOrderMode() {
    try {
      var file = getMenuOrderModePath();
      if (!file || !file.exists()) {
        return DEFAULT_MENU_ORDER_MODE;
      }

      var raw = readTextFile(file).trim();
      if (!raw) {
        return DEFAULT_MENU_ORDER_MODE;
      }

      var payload = JSON.parse(raw);
      var mode = payload && payload.mode ? String(payload.mode) : "";
      if (VALID_MENU_ORDER_MODES[mode]) {
        return mode;
      }
      return DEFAULT_MENU_ORDER_MODE;
    } catch (modeError) {
      writeTrace("mode parse error");
      return DEFAULT_MENU_ORDER_MODE;
    }
  }

  function getMenuScreenBounds(win, menu) {
    try {
      if (menu.boxObject && menu.boxObject.height > 0) {
        return {
          top: menu.boxObject.screenY,
          bottom: menu.boxObject.screenY + menu.boxObject.height
        };
      }
    } catch (boxError) {}

    try {
      var rect = menu.getBoundingClientRect();
      if (rect && rect.height > 0) {
        return {
          top: win.mozInnerScreenY + rect.top,
          bottom: win.mozInnerScreenY + rect.bottom
        };
      }
    } catch (rectError) {}

    return null;
  }

  function getTargetPlacement(win, menu) {
    if (MENU_ORDER_MODE != "near_cursor") {
      return "top";
    }

    var cursorY = win.avtextLastContextMenuScreenY;
    if (typeof cursorY != "number") {
      return "top";
    }

    var bounds = getMenuScreenBounds(win, menu);
    if (!bounds) {
      return "top";
    }

    var distanceToTop = Math.abs(cursorY - bounds.top);
    var distanceToBottom = Math.abs(bounds.bottom - cursorY);
    return distanceToTop <= distanceToBottom ? "top" : "bottom";
  }

  function normalizeSeparators() {
    // Separator cleanup is intentionally skipped in the lightweight variant.
  }

  function moveAvTextTarget(win, phase) {
    if (SESSION_DISABLED) {
      return;
    }

    var startedAt = new Date().getTime();
    try {
      var menu = win.document.getElementById("contentAreaContextMenu");
      if (!menu) {
        writeTrace("menu not found: " + phase);
        return;
      }

      var items = Array.prototype.slice.call(menu.children);
      var target = null;
      var i;
      for (i = 0; i < items.length; i++) {
        var node = items[i];
        if (isMenuNode(node) && isTargetLabel(node.getAttribute("label"))) {
          target = node;
          break;
        }
      }
      if (!target) {
        writeTrace("target not found: " + phase);
        return;
      }

      var placement = getTargetPlacement(win, menu);
      if (placement == "bottom") {
        if (menu.lastElementChild != target) {
          menu.appendChild(target);
        }
      } else if (menu.firstElementChild != target) {
        menu.insertBefore(target, menu.firstChild);
      }

      normalizeSeparators(menu);

      writeTrace(
        "moved: " +
        phase +
        " mode=" +
        MENU_ORDER_MODE +
        " placement=" +
        placement +
        " index=" +
        Array.prototype.indexOf.call(menu.children, target)
      );
    } catch (moveError) {
      SESSION_DISABLED = true;
      writeTrace("session disabled by move error: " + phase, true);
      return;
    }

    var elapsedMs = new Date().getTime() - startedAt;
    if (elapsedMs >= MAX_MOVE_DURATION_MS) {
      SLOW_MOVE_COUNT += 1;
      writeTrace(
        "slow move detected: phase=" +
        phase +
        " elapsedMs=" +
        elapsedMs +
        " slowCount=" +
        SLOW_MOVE_COUNT,
        true
      );
      if (SLOW_MOVE_COUNT >= MAX_SLOW_MOVES_PER_SESSION) {
        SESSION_DISABLED = true;
        writeTrace("session disabled by slow moves", true);
      }
    }
  }

  function attach(win) {
    try {
      if (!win || win.location.href != "chrome://browser/content/browser.xhtml") {
        return;
      }

      var menu = win.document.getElementById("contentAreaContextMenu");
      if (!menu || menu.hasAttribute("avtext-order-hooked")) {
        return;
      }

      win.document.addEventListener(
        "contextmenu",
        function(event) {
          win.avtextLastContextMenuScreenY = event.screenY;
        },
        true
      );

      menu.addEventListener(
        "popupshowing",
        function(event) {
          if (event.target != menu || SESSION_DISABLED) {
            return;
          }
          writeTrace("popupshowing");
          moveAvTextTarget(win, "popupshowing");
          if (!SESSION_DISABLED) {
            win.setTimeout(function() { moveAvTextTarget(win, "timeout0"); }, 0);
          }
        },
        true
      );

      menu.setAttribute("avtext-order-hooked", "true");
      writeTrace("attached");
    } catch (attachError) {
      writeTrace("attach error");
    }
  }

  var observerService = Cc["@mozilla.org/observer-service;1"]
    .getService(Ci.nsIObserverService);
  var windowMediator = Cc["@mozilla.org/appshell/window-mediator;1"]
    .getService(Ci.nsIWindowMediator);

  var observer = {
    observe: function(subject, topic, data) {
      if (topic == "browser-delayed-startup-finished") {
        writeTrace("startup observed");
        attach(subject);
      }
    }
  };

  observerService.addObserver(observer, "browser-delayed-startup-finished", false);

  var windows = windowMediator.getEnumerator("navigator:browser");
  while (windows.hasMoreElements()) {
    var win = windows.getNext();
    if (win.gBrowserInit && win.gBrowserInit.delayedStartupFinished) {
      attach(win);
    }
  }

  MENU_ORDER_MODE = getMenuOrderMode();
  writeTrace("config loaded");
} catch (error) {}
