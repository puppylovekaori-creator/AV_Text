// AutoConfig for AV Text context-menu ordering
try {
  var Cc = Components.classes;
  var Ci = Components.interfaces;

  function writeTrace(message) {
    try {
      var file = Cc["@mozilla.org/file/directory_service;1"]
        .getService(Ci.nsIProperties)
        .get("ProfD", Ci.nsIFile);
      file.append("avtext-autoconfig.log");

      var fileStream = Cc["@mozilla.org/network/file-output-stream;1"]
        .createInstance(Ci.nsIFileOutputStream);
      fileStream.init(file, 0x02 | 0x08 | 0x20, 420, 0);

      var converter = Cc["@mozilla.org/intl/converter-output-stream;1"]
        .createInstance(Ci.nsIConverterOutputStream);
      converter.init(fileStream, "UTF-8", 0, 0);
      converter.writeString(new Date().toISOString() + " " + message + "\n");
      converter.close();
    } catch (traceError) {}
  }

  function isMenuNode(node) {
    return node && (node.localName == "menu" || node.localName == "menuitem");
  }

  function moveAvTextToTop(win, phase) {
    try {
      var menu = win.document.getElementById("contentAreaContextMenu");
      if (!menu) {
        writeTrace("menu not found: " + phase);
        return;
      }

      var items = Array.prototype.slice.call(menu.children);
      var target = null;
      var i;
      for (i = 0; i < items.length; i++) {
        var node = items[i];
        if (isMenuNode(node) && node.getAttribute("label") == "AV Text Paster") {
          target = node;
          break;
        }
      }
      if (!target) {
        writeTrace("target not found: " + phase);
        return;
      }

      if (menu.firstElementChild != target) {
        menu.insertBefore(target, menu.firstChild);
      }

      var prev = target.previousElementSibling;
      if (prev && prev.localName == "menuseparator") {
        prev.hidden = true;
      }

      writeTrace("moved: " + phase + " index=" + Array.prototype.indexOf.call(menu.children, target));
    } catch (moveError) {
      writeTrace("move error: " + phase);
    }
  }

  function attach(win) {
    try {
      if (!win || win.location.href != "chrome://browser/content/browser.xhtml") {
        return;
      }

      var menu = win.document.getElementById("contentAreaContextMenu");
      if (!menu || menu.hasAttribute("avtext-order-hooked")) {
        return;
      }

      menu.addEventListener(
        "popupshowing",
        function(event) {
          if (event.target != menu) {
            return;
          }
          writeTrace("popupshowing");
          moveAvTextToTop(win, "popupshowing");
          win.setTimeout(function() { moveAvTextToTop(win, "timeout0"); }, 0);
          win.setTimeout(function() { moveAvTextToTop(win, "timeout50"); }, 50);
          win.setTimeout(function() { moveAvTextToTop(win, "timeout200"); }, 200);
        },
        true
      );

      menu.addEventListener(
        "popupshown",
        function(event) {
          if (event.target == menu) {
            writeTrace("popupshown");
            moveAvTextToTop(win, "popupshown");
          }
        },
        true
      );

      var observer = new win.MutationObserver(function() {
        if (menu.state == "open" || menu.state == "showing") {
          moveAvTextToTop(win, "mutation");
        }
      });
      observer.observe(menu, { childList: true, attributes: true, subtree: false });

      menu.setAttribute("avtext-order-hooked", "true");
      writeTrace("attached");
    } catch (attachError) {
      writeTrace("attach error");
    }
  }

  var observerService = Cc["@mozilla.org/observer-service;1"]
    .getService(Ci.nsIObserverService);
  var windowMediator = Cc["@mozilla.org/appshell/window-mediator;1"]
    .getService(Ci.nsIWindowMediator);

  var observer = {
    observe: function(subject, topic, data) {
      if (topic == "browser-delayed-startup-finished") {
        writeTrace("startup observed");
        attach(subject);
      }
    }
  };

  observerService.addObserver(observer, "browser-delayed-startup-finished", false);

  var windows = windowMediator.getEnumerator("navigator:browser");
  while (windows.hasMoreElements()) {
    var win = windows.getNext();
    if (win.gBrowserInit && win.gBrowserInit.delayedStartupFinished) {
      attach(win);
    }
  }

  writeTrace("config loaded");
} catch (error) {}
